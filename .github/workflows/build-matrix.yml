name: build-matrix

# Rebuilds public/data/matrix.json on a schedule and commits it, so the static
# site always serves fresh strength scores. GitHub cron is best-effort and
# won't fire faster than ~5 min; a dedicated worker can replace this later for
# true 60s updates.
on:
  schedule:
    - cron: '*/15 * * * *'      # every 15 minutes
  workflow_dispatch:            # allow manual runs

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build matrix.json
        run: python worker/build_matrix.py

      - name: Commit if changed
        run: |
          git config user.name  "fxstrength-bot"
          git config user.email "bot@users.noreply.github.com"
          git add public/data/matrix.json
          if git diff --staged --quiet; then
            echo "no change"
          else
            git commit -m "data: refresh strength matrix"
            git push
          fi
