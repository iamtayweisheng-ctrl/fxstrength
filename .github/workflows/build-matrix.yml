name: build-matrix

# Rebuilds the strength matrix on a schedule and publishes it to the `data`
# branch (a single matrix.json). The live site fetches that file from GitHub's
# CDN, so Cloudflare Pages — which builds from `main` — never rebuilds when the
# data refreshes. GitHub cron is best-effort and won't fire faster than ~5 min;
# a dedicated worker can replace this later for true 60s updates.
on:
  schedule:
    - cron: '*/15 * * * *'      # every 15 minutes
  workflow_dispatch:            # allow manual runs

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build matrix.json
        run: python worker/build_matrix.py

      - name: Publish to the data branch
        run: |
          git config user.name  "fxstrength-bot"
          git config user.email "bot@users.noreply.github.com"
          tmp="$(mktemp -d)"
          cp public/data/matrix.json "$tmp/matrix.json"
          cd "$tmp"
          git init -q
          git checkout -q -b data
          git add matrix.json
          git commit -q -m "data: refresh strength matrix"
          git push -f "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" data
